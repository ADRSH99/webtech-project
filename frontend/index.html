<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Model Deployment Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .iframe-container {
            width: 100%;
            height: 80vh;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-6">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900">ML Model Deployment Platform</h1>
                        <p class="text-gray-600 mt-1">Deploy your ML models with auto-generated Gradio interfaces</p>
                    </div>
                    <div class="flex items-center space-x-4">
                        <button id="healthCheck" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            Check Health
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Upload Section -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-semibold mb-4">Deploy New Model</h2>
                <form id="uploadForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Model File (.pkl, .pt, .onnx)
                            </label>
                            <input type="file" id="modelFile" accept=".pkl,.pt,.onnx" required
                                   class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Configuration File (config.json)
                            </label>
                            <input type="file" id="configFile" accept=".json" required
                                   class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        </div>
                    </div>
                    <button type="submit" id="deployBtn" 
                            class="w-full md:w-auto px-6 py-3 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                        Deploy Model
                    </button>
                </form>
                
                <!-- Progress Indicator -->
                <div id="progress" class="hidden mt-4">
                    <div class="flex items-center space-x-2">
                        <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600"></div>
                        <span class="text-sm text-gray-600">Deploying model...</span>
                    </div>
                </div>
                
                <!-- Result Message -->
                <div id="result" class="hidden mt-4 p-4 rounded-lg"></div>
            </div>

            <!-- Deployed Models Section -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-semibold mb-4">Deployed Models</h2>
                <div id="deployedModels" class="space-y-4">
                    <p class="text-gray-500">No models deployed yet.</p>
                </div>
            </div>

            <!-- Gradio Interface Section -->
            <div id="gradioSection" class="hidden bg-white rounded-lg shadow-md p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Model Interface</h2>
                    <button id="closeInterface" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                        Close Interface
                    </button>
                </div>
                <div class="iframe-container">
                    <iframe id="gradioFrame" src="" title="Gradio Interface"></iframe>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let deployedModels = [];

        // Health check
        document.getElementById('healthCheck').addEventListener('click', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                const statusColor = data.docker_available ? 'green' : 'red';
                const statusText = data.docker_available ? 'Connected' : 'Not Available';
                
                alert(`Health Status: ${data.status}\nDocker: ${statusText}`);
            } catch (error) {
                alert('Failed to connect to backend. Is the server running?');
            }
        });

        // Deploy model
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const modelFile = document.getElementById('modelFile').files[0];
            const configFile = document.getElementById('configFile').files[0];
            
            if (!modelFile || !configFile) {
                showResult('Please select both model and configuration files.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('model_file', modelFile);
            formData.append('config_file', configFile);

            // Show progress
            document.getElementById('progress').classList.remove('hidden');
            document.getElementById('deployBtn').disabled = true;
            document.getElementById('result').classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/deploy-model`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    showResult(`Model deployed successfully! Container ID: ${result.container_id}`, 'success');
                    
                    // Add to deployed models list
                    const model = {
                        id: result.container_id,
                        url: result.url,
                        framework: result.framework,
                        task: result.task,
                        timestamp: new Date().toLocaleString()
                    };
                    deployedModels.push(model);
                    updateDeployedModels();
                } else {
                    showResult(`Deployment failed: ${result.detail}`, 'error');
                }
            } catch (error) {
                showResult(`Network error: ${error.message}`, 'error');
            } finally {
                // Hide progress
                document.getElementById('progress').classList.add('hidden');
                document.getElementById('deployBtn').disabled = false;
            }
        });

        // Update deployed models list
        function updateDeployedModels() {
            const container = document.getElementById('deployedModels');
            
            if (deployedModels.length === 0) {
                container.innerHTML = '<p class="text-gray-500">No models deployed yet.</p>';
                return;
            }

            container.innerHTML = deployedModels.map(model => `
                <div class="border rounded-lg p-4 hover:bg-gray-50">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-medium">Container: ${model.id}</h3>
                            <p class="text-sm text-gray-600">Framework: ${model.framework}</p>
                            <p class="text-sm text-gray-600">Task: ${model.task}</p>
                            <p class="text-sm text-gray-500">Deployed: ${model.timestamp}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="openInterface('${model.url}')" 
                                    class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
                                Open Interface
                            </button>
                            <button onclick="stopModel('${model.id}')" 
                                    class="px-3 py-1 bg-red-600 text-white text-sm rounded hover:bg-red-700">
                                Stop
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Open Gradio interface
        function openInterface(url) {
            const iframe = document.getElementById('gradioFrame');
            const section = document.getElementById('gradioSection');
            
            iframe.src = url;
            section.classList.remove('hidden');
            section.scrollIntoView({ behavior: 'smooth' });
        }

        // Close interface
        document.getElementById('closeInterface').addEventListener('click', () => {
            document.getElementById('gradioSection').classList.add('hidden');
            document.getElementById('gradioFrame').src = '';
        });

        // Stop model
        async function stopModel(containerId) {
            if (!confirm(`Are you sure you want to stop container ${containerId}?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/containers/${containerId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    deployedModels = deployedModels.filter(m => m.id !== containerId);
                    updateDeployedModels();
                    showResult(`Container ${containerId} stopped successfully.`, 'success');
                } else {
                    const result = await response.json();
                    showResult(`Failed to stop container: ${result.detail}`, 'error');
                }
            } catch (error) {
                showResult(`Network error: ${error.message}`, 'error');
            }
        }

        // Show result message
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.classList.remove('hidden', 'bg-green-100', 'bg-red-100', 'text-green-800', 'text-red-800');
            
            if (type === 'success') {
                resultDiv.classList.add('bg-green-100', 'text-green-800');
            } else {
                resultDiv.classList.add('bg-red-100', 'text-red-800');
            }
        }

        // Initialize
        updateDeployedModels();
    </script>
</body>
</html>
